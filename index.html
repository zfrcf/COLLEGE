<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Modération Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .section { background: #2c2c2c; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #444; }
        h1, h2 { color: #e74c3c; margin-top: 0; }
        h2 { color: #4a90e2; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        .post, .banned-item { 
            background: #1e1e1e; padding: 12px; border-radius: 8px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #444;
        }
        .post { border-left-color: #e74c3c; }
        .banned-item { border-left-color: #6c5ce7; }

        .btn { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-left: 5px; }
        .del { background: #e74c3c; } 
        .ban { background: #6c5ce7; }
        .unban { background: #2ecc71; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        
        .controls { margin-bottom: 15px; font-size: 0.9rem; color: #bbb; }
    </style>
</head>
<body>

    <div style="max-width: 800px; margin: 0 auto;">
        <h1>🛡️ Modération Cloud</h1>

        <div class="section">
            <h2>💬 Messages en temps réel</h2>
            <div class="controls">
                <label><input type="checkbox" id="fastMode"> ⚡ Mode Rapide (Pas de confirmation)</label>
            </div>
            <div id="admin-feed">Chargement des messages...</div>
        </div>

        <div class="section">
            <h2>🚫 Liste des membres bannis</h2>
            <div id="banned-list">Aucun banni pour le moment.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GESTION DES MESSAGES ---
        onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
            const feed = document.getElementById('admin-feed'); feed.innerHTML = "";
            snaps.forEach(d => {
                const data = d.data();
                const div = document.createElement('div'); div.className = 'post';
                div.innerHTML = `<span><b>${data.auteur}</b>: ${data.texte}</span>
                <div>
                    <button class="btn del" onclick="supprimer('${d.id}')">EFFACER</button>
                    <button class="btn ban" onclick="bannir('${data.auteur}', '${d.id}')">BAN</button>
                </div>`;
                feed.appendChild(div);
            });
        });

        // --- GESTION DES BANNIS (DEBAN) ---
        onSnapshot(collection(db, "BannedUsers"), (snaps) => {
            const list = document.getElementById('banned-list');
            if(snaps.empty) { list.innerHTML = "Personne n'est banni."; return; }
            list.innerHTML = "";
            snaps.forEach(d => {
                const div = document.createElement('div'); div.className = 'banned-item';
                div.innerHTML = `<span>👤 <b>${d.id}</b></span>
                <button class="btn unban" onclick="deban('${d.id}')">DÉBANNIR</button>`;
                list.appendChild(div);
            });
        });

        // --- ACTIONS ---
        window.supprimer = async (id) => {
            if(document.getElementById('fastMode').checked || confirm("Supprimer ce message ?")) {
                await deleteDoc(doc(db, "messages", id));
            }
        };

        window.bannir = async (nom, id) => {
            if(confirm("Bannir " + nom + " ?")) {
                await setDoc(doc(db, "BannedUsers", nom), { date: serverTimestamp() });
                await deleteDoc(doc(db, "messages", id));
            }
        };

        window.deban = async (nom) => {
            if(confirm("Redonner la parole à " + nom + " ?")) {
                await deleteDoc(doc(db, "BannedUsers", nom));
                alert(nom + " peut à nouveau publier !");
            }
        };
    </script>
</body>
</html>
