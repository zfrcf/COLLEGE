<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Système de Contrôle - Admin Terminal</title>
    <style>
        /* --- STYLE TERMINAL RETRO --- */
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background-color: #05070a;
            color: #39ff14;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        h1 { font-size: 1.2rem; border-bottom: 1px solid #39ff14; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 0.9rem; color: #58a6ff; margin-top: 0; text-transform: uppercase; }

        .container { max-width: 1400px; margin: 0 auto; }

        /* --- SECTIONS --- */
        .section {
            background: rgba(16, 20, 25, 0.8);
            border: 1px solid #1f242b;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 20px; }

        /* --- LISTES ET LOGS --- */
        .scroll-box { height: 300px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #1f242b #05070a; }
        
        .entry {
            font-size: 0.85rem;
            padding: 8px;
            border-bottom: 1px solid #161b22;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .entry:hover { background: rgba(57, 255, 20, 0.05); }

        .user-tag { color: #58a6ff; font-weight: bold; }
        .del-text { color: #ff7b72; font-style: italic; }

        /* --- BOUTONS TERMINAL --- */
        .btn {
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 3px 8px;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn:hover { background: #39ff14; color: #05070a; box-shadow: 0 0 10px #39ff14; }
        .btn-restore { border-color: #238636; color: #238636; }
        .btn-restore:hover { background: #238636; color: white; box-shadow: 0 0 10px #238636; }

        /* --- CONSOLE FIXE --- */
        .console-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #010409;
            border-top: 2px solid #39ff14;
            padding: 15px 30px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .prompt { color: #39ff14; font-weight: bold; font-size: 1.1rem; }
        #termInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #39ff14;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            caret-color: #39ff14;
        }

        /* --- EFFET SCANLINE --- */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            pointer-events: none;
            background-size: 100% 2px, 3px 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>>_ ADMIN_CONSOLE / ACCESS_LEVEL: ROOT</h1>

    <div class="section">
        <h2>[LIVE_STREAM] - Messages du Cloud</h2>
        <div id="admin-feed" class="scroll-box">Initialisation du flux...</div>
    </div>

    <div class="grid">
        <div class="section">
            <h2>[RECOVERY_LOGS] - Suppressions</h2>
            <div id="del-logs" class="scroll-box" style="color: #8b949e;">Aucun log détecté.</div>
        </div>

        <div class="section">
            <h2>[BANNED_DB] - Utilisateurs Bloqués</h2>
            <div id="banned-list" class="scroll-box">Base de données vide.</div>
        </div>

        <div class="section">
            <h2>[HISTORY_LOGS] - Grâces</h2>
            <div id="history-list" class="scroll-box">Aucun événement.</div>
        </div>
    </div>
</div>

<div class="console-wrapper">
    <span class="prompt">admin@college_social:~$</span>
    <input type="text" id="termInput" placeholder="Tapez /ban Nom ou /unban Nom..." autofocus autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, setDoc, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- CONFIGURATION FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
        authDomain: "college-social-cloud.firebaseapp.com",
        projectId: "college-social-cloud",
        storageBucket: "college-social-cloud.firebasestorage.app",
        messagingSenderId: "757988289620",
        appId: "1:757988289620:web:6054829b97a73d28ce91c1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- CHARGEMENT DU FLUX LIVE ---
    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
        const feed = document.getElementById('admin-feed'); feed.innerHTML = "";
        snaps.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'entry';
            
            const sAuteur = data.auteur.replace(/'/g, "\\'");
            const sTexte = data.texte.replace(/'/g, "\\'");
            
            div.innerHTML = `<span>[OK] <span class="user-tag">${data.auteur}</span>: ${data.texte}</span> 
            <button class="btn" onclick="handleDelete('${d.id}', '${sAuteur}', '${sTexte}')">DEL</button>`;
            feed.appendChild(div);
        });
    });

    // --- ACTION : SUPPRESSION + SAUVEGARDE TEMPORAIRE ---
    window.handleDelete = async (id, auteur, texte) => {
        const logBox = document.getElementById('del-logs');
        if(logBox.innerHTML.includes("Aucun log")) logBox.innerHTML = "";
        
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `<span class="del-text">[SUPPR] ${auteur}: ${texte}</span>
                         <button class="btn btn-restore" onclick="undoDelete('${auteur.replace(/'/g, "\\'")}', '${texte.replace(/'/g, "\\'")}', this)">RESTORE</button>`;
        logBox.prepend(div);

        await deleteDoc(doc(db, "messages", id));
    };

    // --- ACTION : RESTAURATION (UNDO) ---
    window.undoDelete = async (auteur, texte, btn) => {
        await addDoc(collection(db, "messages"), {
            auteur: auteur,
            texte: texte,
            date: serverTimestamp()
        });
        btn.parentElement.remove();
    };

    // --- DATABASE BANNIS ---
    onSnapshot(collection(db, "BannedUsers"), (snaps) => {
        const list = document.getElementById('banned-list'); list.innerHTML = "";
        snaps.forEach(d => {
            list.innerHTML += `<div class="entry"><span>[BLOCKED] ${d.id}</span></div>`;
        });
    });

    // --- LOGS DEBAN ---
    onSnapshot(query(collection(db, "HistoriqueDeban"), orderBy("date", "desc")), (snaps) => {
        const hist = document.getElementById('history-list'); hist.innerHTML = "";
        snaps.forEach(d => {
            hist.innerHTML += `<div class="entry" style="color:#8b949e;">[DEBAN] ${d.data().nom}</div>`;
        });
    });

    // --- TERMINAL DE COMMANDE ---
    const termInput = document.getElementById('termInput');
    termInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = termInput.value.trim();
            termInput.value = "";
            
            if (cmd.startsWith('/ban ')) {
                const name = cmd.replace('/ban ', '').trim();
                if(name) await setDoc(doc(db, "BannedUsers", name), { date: serverTimestamp() });
            } 
            else if (cmd.startsWith('/unban ')) {
                const name = cmd.replace('/unban ', '').trim();
                if(name) {
                    await deleteDoc(doc(db, "BannedUsers", name));
                    await addDoc(collection(db, "HistoriqueDeban"), { nom: name, date: serverTimestamp() });
                }
            }
            else if (cmd === '/clear') {
                document.getElementById('del-logs').innerHTML = "Logs nettoyés.";
            }
        }
    });
</script>
</body>
</html>
