<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ROOT_CONSOLE - Image Mod & Archive</title>
    <style>
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: #05070a; color: #39ff14;
            margin: 0; padding: 20px; padding-bottom: 100px;
        }
        h1 { font-size: 1.1rem; border-bottom: 1px solid #39ff14; padding-bottom: 8px; text-transform: uppercase; }
        h2 { font-size: 0.85rem; color: #58a6ff; margin-top: 0; border-bottom: 1px solid #1f242b; }

        .container { max-width: 1400px; margin: 0 auto; }
        .section { background: rgba(16, 20, 25, 0.9); border: 1px solid #1f242b; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .scroll-box { height: 350px; overflow-y: auto; }

        /* --- STYLE DES MESSAGES --- */
        .entry {
            font-size: 0.85rem; padding: 10px; border-bottom: 1px solid #161b22;
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        .user-tag { color: #58a6ff; font-weight: bold; min-width: 80px; }
        
        /* --- STYLE DES IMAGES DANS L'ADMIN --- */
        .entry img { 
            max-height: 50px; border-radius: 3px; border: 1px solid #39ff14; 
            cursor: pointer; transition: 0.2s; 
        }
        .entry img:hover { max-height: 250px; position: relative; z-index: 100; }

        .edit-input {
            background: #0d1117; border: 1px solid #30363d; color: #ffa657;
            padding: 5px; border-radius: 3px; flex: 1; font-family: inherit;
        }

        .btn {
            background: transparent; border: 1px solid #39ff14; color: #39ff14;
            font-size: 0.7rem; cursor: pointer; padding: 4px 8px; text-transform: uppercase;
        }
        .btn:hover { background: #39ff14; color: #05070a; }
        .btn-restore { border-color: #238636; color: #238636; }
        .btn-restore:hover { background: #238636; color: white; }

        .console-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #010409; border-top: 2px solid #39ff14;
            padding: 15px 30px; box-sizing: border-box; display: flex; gap: 10px;
        }
        #termInput { flex: 1; background: transparent; border: none; color: #39ff14; font-size: 1.1rem; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>>_ ADMIN_TERMINAL [IMAGE_SYNC_ENABLED]</h1>

    <div class="section">
        <h2>[LIVE_CHAT] - Flux avec Images</h2>
        <div id="admin-feed" class="scroll-box">Connexion...</div>
    </div>

    <div class="grid">
        <div class="section">
            <h2>[CLOUD_ARCHIVES] - Éditer & Restaurer</h2>
            <div id="del-logs" class="scroll-box">Archives vides.</div>
        </div>
        <div class="section">
            <h2>[BANNED_USERS] - Liste Noire</h2>
            <div id="banned-list" style="height: 150px; overflow-y:auto;"></div>
            <h2 style="margin-top:20px;">[HISTORY] - Grâces</h2>
            <div id="history-list" style="height: 150px; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<div class="console-bar">
    <span style="color:#39ff14;">admin@cloud:~$</span>
    <input type="text" id="termInput" placeholder="/ban [nom] | /unban [nom]" autofocus autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, setDoc, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
        authDomain: "college-social-cloud.firebaseapp.com",
        projectId: "college-social-cloud",
        storageBucket: "college-social-cloud.firebasestorage.app",
        messagingSenderId: "757988289620",
        appId: "1:757988289620:web:6054829b97a73d28ce91c1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 1. LIVE FEED AVEC PREVIEW IMAGES ---
    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
        const feed = document.getElementById('admin-feed'); feed.innerHTML = "";
        snaps.forEach(d => {
            const data = d.data();
            let text = data.texte;
            const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
            if(imgRegex.test(text)) text = text.replace(imgRegex, (url) => `<br><img src="${url}">`);

            const div = document.createElement('div');
            div.className = 'entry';
            div.innerHTML = `<span><span class="user-tag">${data.auteur}</span>: ${text}</span> 
            <button class="btn" onclick="moveToArchive('${d.id}', '${data.auteur.replace(/'/g, "\\'")}', '${data.texte.replace(/'/g, "\\'")}')">ARCHIVE</button>`;
            feed.appendChild(div);
        });
    });

    // --- 2. ARCHIVES AVEC ÉDITION ---
    onSnapshot(query(collection(db, "MessagesSupprimes"), orderBy("dateSuppr", "desc")), (snaps) => {
        const logBox = document.getElementById('del-logs');
        logBox.innerHTML = snaps.empty ? "Archives vides." : "";
        snaps.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'entry';
            div.innerHTML = `<span class="user-tag">${data.auteur}</span>
                <input type="text" class="edit-input" id="edit-${d.id}" value="${data.texte}">
                <button class="btn btn-restore" onclick="restoreCloud('${d.id}', '${data.auteur.replace(/'/g, "\\'")}')">RESTORE</button>`;
            logBox.appendChild(div);
        });
    });

    // --- ACTIONS ---
    window.moveToArchive = async (id, auteur, texte) => {
        await addDoc(collection(db, "MessagesSupprimes"), { auteur, texte, dateSuppr: serverTimestamp() });
        await deleteDoc(doc(db, "messages", id));
    };

    window.restoreCloud = async (id, auteur) => {
        const newText = document.getElementById(`edit-${id}`).value;
        await addDoc(collection(db, "messages"), { auteur, texte: newText, date: serverTimestamp() });
        await deleteDoc(doc(db, "MessagesSupprimes", id));
    };

    // --- COMMANDES TERMINAL ---
    document.getElementById('termInput').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = termInput.value.trim();
            termInput.value = "";
            if (cmd.startsWith('/ban ')) {
                const name = cmd.replace('/ban ', '').trim();
                await setDoc(doc(db, "BannedUsers", name), { date: serverTimestamp() });
            } else if (cmd.startsWith('/unban ')) {
                const name = cmd.replace('/unban ', '').trim();
                await deleteDoc(doc(db, "BannedUsers", name));
                await addDoc(collection(db, "HistoriqueDeban"), { nom: name, date: serverTimestamp() });
            }
        }
    });

    // BANNIS & LOGS
    onSnapshot(collection(db, "BannedUsers"), s => {
        document.getElementById('banned-list').innerHTML = "";
        s.forEach(d => document.getElementById('banned-list').innerHTML += `<div class="entry">[BAN] ${d.id}</div>`);
    });
</script>
</body>
</html>
