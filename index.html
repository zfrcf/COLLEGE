<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL MODÉRATION - Collège Social</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #e74c3c; padding-bottom: 10px; color: #e74c3c; }
        
        .controls { background: #2c2c2c; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; }

        .post { 
            background: #2c2c2c; padding: 15px; border-radius: 8px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #444;
        }
        .post-info { flex: 1; }
        .post-info b { color: #4a90e2; }
        
        .btn-group { display: flex; gap: 10px; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .ban-btn { background: #6c5ce7; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛠️ Panel de Modération</h1>
        
        <div class="controls">
            <label style="cursor: pointer;">
                <input type="checkbox" id="noConfirm"> ⚡ **Mode Rapide** (Supprimer sans demander confirmation)
            </label>
        </div>

        <div id="admin-feed">Chargement des messages...</div>
    </div>

    <script type="module">
        // Importations obligatoires
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, setDoc, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CHARGER LES MESSAGES
        const q = query(collection(db, "messages"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('admin-feed');
            feed.innerHTML = "";
            
            snapshot.forEach((d) => {
                const data = d.data();
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-info">
                        <b>${data.auteur}</b><br>
                        <span>${data.texte}</span>
                    </div>
                    <div class="btn-group">
                        <button class="del-btn" onclick="supprimer('${d.id}')">SUPPRIMER</button>
                        <button class="ban-btn" onclick="bannir('${data.auteur}', '${d.id}')">BANNIR</button>
                    </div>
                `;
                feed.appendChild(div);
            });
        });

        // FONCTION SUPPRIMER
        window.supprimer = async (id) => {
            const skip = document.getElementById('noConfirm').checked;
            if(skip || confirm("Supprimer ce message ?")) {
                await deleteDoc(doc(db, "messages", id));
            }
        };

        // FONCTION BANNIR
        window.bannir = async (nom, msgId) => {
            if(confirm("Bannir " + nom + " ?")) {
                // Ajout à la liste noire
                await setDoc(doc(db, "BannedUsers", nom), {
                    date: serverTimestamp(),
                    raison: "Modération Panel"
                });
                // Suppression du message
                await deleteDoc(doc(db, "messages", msgId));
                alert(nom + " a été banni.");
            }
        };
    </script>
</body>
</html>
