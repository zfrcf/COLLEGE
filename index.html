<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL MODÉRATION - Collège Social</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #e74c3c; padding-bottom: 10px; color: #e74c3c; }
        
        .post { 
            background: #2c2c2c; padding: 15px; border-radius: 8px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #444;
        }
        .post-info { flex: 1; }
        .post-info b { color: #4a90e2; }
        .post-info i { color: #888; font-size: 0.8rem; }
        
        .del-btn { 
            background: #e74c3c; color: white; border: none; 
            padding: 10px 15px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; margin-left: 10px;
        }
        .del-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛠️ Panel de Modération</h1>
        <p>Tous les messages du Cloud s'affichent ici. Action irréversible.</p>
        <div id="admin-feed">Chargement des messages...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION (La même que ton app principale)
        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const postsCol = collection(db, "messages");

        // CHARGER LES MESSAGES
        const q = query(postsCol, orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('admin-feed');
            feed.innerHTML = "";
            
            snapshot.forEach((d) => {
                const data = d.data();
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-info">
                        <b>${data.auteur}</b> (${data.college})<br>
                        <span>${data.texte}</span>
                    </div>
                    <button class="del-btn" onclick="supprimer('${d.id}')">SUPPRIMER</button>
                `;
                feed.appendChild(div);
            });
        });

        // FONCTION SUPPRIMER
        window.supprimer = async (id) => {
            if(confirm("Supprimer ce message pour TOUT LE MONDE ?")) {
                try {
                    await deleteDoc(doc(db, "messages", id));
                } catch (e) {
                    alert("Erreur : Vérifie que tes règles Firestore autorisent la suppression !");
                }
            }
        };
    </script>
</body>
</html>
