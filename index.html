<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Modération</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .post { background: #2c2c2c; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid #444; }
        .btn { border: none; padding: 10px; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-left: 10px; }
        .del { background: #e74c3c; } .ban { background: #6c5ce7; }
    </style>
</head>
<body>
    <h1>🛠️ Modération Cloud</h1>
    <label><input type="checkbox" id="fastMode"> ⚡ Mode Rapide (Sans confirmation)</label>
    <hr>
    <div id="admin-feed">Chargement...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
            const feed = document.getElementById('admin-feed'); feed.innerHTML = "";
            snaps.forEach(d => {
                const data = d.data();
                const div = document.createElement('div'); div.className = 'post';
                div.innerHTML = `<span><b>${data.auteur}</b>: ${data.texte}</span>
                <div>
                    <button class="btn del" onclick="supprimer('${d.id}')">EFFACER</button>
                    <button class="btn ban" onclick="bannir('${data.auteur}', '${d.id}')">BAN</button>
                </div>`;
                feed.appendChild(div);
            });
        });

        window.supprimer = async (id) => {
            if(document.getElementById('fastMode').checked || confirm("Supprimer ?")) await deleteDoc(doc(db, "messages", id));
        };

        window.bannir = async (nom, id) => {
            if(confirm("Bannir " + nom + " ?")) {
                await setDoc(doc(db, "BannedUsers", nom), { date: serverTimestamp() });
                await deleteDoc(doc(db, "messages", id));
            }
        };
    </script>
</body>
</html>
