<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ROOT_CONSOLE - System Admin</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #05070a; color: #39ff14; padding: 20px; padding-bottom: 100px; }
        .section { background: rgba(16, 20, 25, 0.9); border: 1px solid #1f242b; padding: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .scroll-box { height: 300px; overflow-y: auto; border: 1px solid #161b22; }
        .entry { padding: 10px; border-bottom: 1px solid #161b22; display: flex; align-items: center; justify-content: space-between; }
        .entry img { max-height: 40px; cursor: pointer; border: 1px solid #39ff14; }
        .entry img:hover { max-height: 200px; position: absolute; z-index: 10; }
        .edit-input { background: #000; border: 1px solid #39ff14; color: #ffa657; padding: 5px; flex: 1; margin: 0 10px; }
        .btn { background: none; border: 1px solid #39ff14; color: #39ff14; cursor: pointer; padding: 5px; font-size: 10px; }
        .btn:hover { background: #39ff14; color: #000; }
        .console { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid #39ff14; padding: 20px; box-sizing: border-box; display: flex; }
        #termInput { flex: 1; background: none; border: none; color: #39ff14; font-size: 1.2rem; outline: none; }
    </style>
</head>
<body>

    <h1>>_ ADMIN_TERMINAL [SYNC_CLOUD_OK]</h1>

    <div class="section">
        <h2>[LIVE_FEED]</h2>
        <div id="admin-feed" class="scroll-box"></div>
    </div>

    <div class="grid">
        <div class="section">
            <h2>[CLOUD_ARCHIVES] - Supprimés (Modifiables)</h2>
            <div id="del-logs" class="scroll-box"></div>
        </div>
        <div class="section">
            <h2>[BANNED_USERS]</h2>
            <div id="banned-list" class="scroll-box"></div>
        </div>
    </div>

    <div class="console">
        <span>admin@root:~$ </span>
        <input type="text" id="termInput" placeholder="/ban [nom] | /unban [nom]" autofocus>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, setDoc, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
            authDomain: "college-social-cloud.firebaseapp.com",
            projectId: "college-social-cloud",
            storageBucket: "college-social-cloud.firebasestorage.app",
            messagingSenderId: "757988289620",
            appId: "1:757988289620:web:6054829b97a73d28ce91c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FLUX LIVE
        onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
            const feed = document.getElementById('admin-feed'); feed.innerHTML = "";
            snaps.forEach(d => {
                const data = d.data();
                const img = data.image ? `<img src="${data.image}">` : "";
                const div = document.createElement('div');
                div.className = 'entry';
                div.innerHTML = `<span><b>${data.auteur}</b>: ${data.texte} ${img}</span> 
                <button class="btn" onclick="archive('${d.id}', '${data.auteur}', '${data.texte || ""}', '${data.image || ""}')">ARCHIVE</button>`;
                feed.appendChild(div);
            });
        });

        // ARCHIVES
        onSnapshot(query(collection(db, "MessagesSupprimes"), orderBy("dateSuppr", "desc")), (snaps) => {
            const box = document.getElementById('del-logs'); box.innerHTML = "";
            snaps.forEach(d => {
                const data = d.data();
                box.innerHTML += `<div class="entry">
                    <b>${data.auteur}</b>
                    <input type="text" class="edit-input" id="edit-${d.id}" value="${data.texte}">
                    <button class="btn" onclick="restore('${d.id}', '${data.auteur}', '${data.image || ""}')">RESTORE</button>
                </div>`;
            });
        });

        window.archive = async (id, auteur, texte, image) => {
            await addDoc(collection(db, "MessagesSupprimes"), { auteur, texte, image, dateSuppr: serverTimestamp() });
            await deleteDoc(doc(db, "messages", id));
        };

        window.restore = async (id, auteur, image) => {
            const newText = document.getElementById('edit-'+id).value;
            await addDoc(collection(db, "messages"), { auteur, texte: newText, image, date: serverTimestamp() });
            await deleteDoc(doc(db, "MessagesSupprimes", id));
        };

        // TERMINAL (BAN/UNBAN)
        document.getElementById('termInput').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = termInput.value.trim(); termInput.value = "";
                if (cmd.startsWith('/ban ')) {
                    const n = cmd.replace('/ban ', '');
                    await setDoc(doc(db, "BannedUsers", n), { date: serverTimestamp() });
                } else if (cmd.startsWith('/unban ')) {
                    const n = cmd.replace('/unban ', '');
                    await deleteDoc(doc(db, "BannedUsers", n));
                }
            }
        });

        onSnapshot(collection(db, "BannedUsers"), s => {
            document.getElementById('banned-list').innerHTML = "";
            s.forEach(d => document.getElementById('banned-list').innerHTML += `<div class="entry">Banni: ${d.id}</div>`);
        });
    </script>
</body>
</html>
