<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ROOT_CONSOLE - Cloud Archiving System</title>
    <style>
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: #05070a;
            color: #39ff14;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        h1 { font-size: 1.2rem; border-bottom: 1px solid #39ff14; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 0.9rem; color: #58a6ff; margin-top: 0; text-transform: uppercase; border-bottom: 1px solid #1f242b; padding-bottom: 5px; }

        .container { max-width: 1400px; margin: 0 auto; }

        .section {
            background: rgba(16, 20, 25, 0.8);
            border: 1px solid #1f242b;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 20px; }

        .scroll-box { height: 350px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #1f242b #05070a; }
        
        .entry {
            font-size: 0.85rem;
            padding: 8px;
            border-bottom: 1px solid #161b22;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .entry:hover { background: rgba(57, 255, 20, 0.05); }

        .user-tag { color: #58a6ff; font-weight: bold; }
        .del-text { color: #ff7b72; font-style: italic; }

        .btn {
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 3px 8px;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn:hover { background: #39ff14; color: #05070a; box-shadow: 0 0 10px #39ff14; }
        .btn-restore { border-color: #238636; color: #238636; }
        .btn-restore:hover { background: #238636; color: white; box-shadow: 0 0 10px #238636; }

        .console-wrapper {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #010409;
            border-top: 2px solid #39ff14;
            padding: 15px 30px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
        }
        .prompt { color: #39ff14; font-weight: bold; }
        #termInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #39ff14;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
        }

        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; pointer-events: none; background-size: 100% 2px, 3px 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>>_ CLOUD_ADMIN_TERMINAL / DATABASE_SYNC_ENABLED</h1>

    <div class="section">
        <h2>[LIVE_MESSAGES] - Flux Actuel</h2>
        <div id="admin-feed" class="scroll-box">Initialisation...</div>
    </div>

    <div class="grid">
        <div class="section">
            <h2>[CLOUD_ARCHIVES] - Messages Supprimés</h2>
            <div id="del-logs" class="scroll-box">Aucune archive sur le Cloud.</div>
        </div>

        <div class="section">
            <h2>[BANNED_USERS] - Liste Noire</h2>
            <div id="banned-list" class="scroll-box">Chargement...</div>
        </div>

        <div class="section">
            <h2>[HISTORY] - Dernières Grâces</h2>
            <div id="history-list" class="scroll-box">Vidé.</div>
        </div>
    </div>
</div>

<div class="console-wrapper">
    <span class="prompt">admin@cloud:~$</span>
    <input type="text" id="termInput" placeholder="Commandes: /ban [nom], /unban [nom]" autofocus autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, setDoc, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAXIryKruq3g7JtdM8jgv8IDGjserqY3IY",
        authDomain: "college-social-cloud.firebaseapp.com",
        projectId: "college-social-cloud",
        storageBucket: "college-social-cloud.firebasestorage.app",
        messagingSenderId: "757988289620",
        appId: "1:757988289620:web:6054829b97a73d28ce91c1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 1. FLUX DES MESSAGES ACTIFS ---
    onSnapshot(query(collection(db, "messages"), orderBy("date", "desc")), (snaps) => {
        const feed = document.getElementById('admin-feed'); feed.innerHTML = "";
        snaps.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'entry';
            const sAuteur = data.auteur.replace(/'/g, "\\'");
            const sTexte = data.texte.replace(/'/g, "\\'");
            div.innerHTML = `<span>[OK] <span class="user-tag">${data.auteur}</span>: ${data.texte}</span> 
            <button class="btn" onclick="archiveAndDelete('${d.id}', '${sAuteur}', '${sTexte}')">DEL</button>`;
            feed.appendChild(div);
        });
    });

    // --- 2. FLUX DES ARCHIVES (MESSAGES SUPPRIMÉS) ---
    onSnapshot(query(collection(db, "MessagesSupprimes"), orderBy("dateSuppr", "desc")), (snaps) => {
        const logBox = document.getElementById('del-logs');
        if(snaps.empty) { logBox.innerHTML = "Archives vides."; return; }
        logBox.innerHTML = "";
        snaps.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'entry';
            const sAuteur = data.auteur.replace(/'/g, "\\'");
            const sTexte = data.texte.replace(/'/g, "\\'");
            div.innerHTML = `<span class="del-text">[ARCHIVE] ${data.auteur}: ${data.texte}</span>
                             <button class="btn btn-restore" onclick="restoreFromCloud('${d.id}', '${sAuteur}', '${sTexte}')">RESTORE</button>`;
            logBox.appendChild(div);
        });
    });

    // --- ACTION : SUPPRIMER ET ENVOYER AU CLOUD ---
    window.archiveAndDelete = async (id, auteur, texte) => {
        // Ajouter à la collection des supprimés
        await addDoc(collection(db, "MessagesSupprimes"), {
            auteur: auteur,
            texte: texte,
            dateSuppr: serverTimestamp()
        });
        // Supprimer du flux principal
        await deleteDoc(doc(db, "messages", id));
    };

    // --- ACTION : RESTAURER DU CLOUD ---
    window.restoreFromCloud = async (docId, auteur, texte) => {
        // Remettre dans le flux principal
        await addDoc(collection(db, "messages"), {
            auteur: auteur,
            texte: texte,
            date: serverTimestamp()
        });
        // Supprimer de l'archive Cloud
        await deleteDoc(doc(db, "MessagesSupprimes", docId));
    };

    // --- BANNIS & HISTORIQUE ---
    onSnapshot(collection(db, "BannedUsers"), (snaps) => {
        const list = document.getElementById('banned-list'); list.innerHTML = "";
        snaps.forEach(d => { list.innerHTML += `<div class="entry"><span>[BLOCKED] ${d.id}</span></div>`; });
    });

    onSnapshot(query(collection(db, "HistoriqueDeban"), orderBy("date", "desc")), (snaps) => {
        const hist = document.getElementById('history-list'); hist.innerHTML = "";
        snaps.forEach(d => { hist.innerHTML += `<div class="entry" style="color:#8b949e;">[DEBAN] ${d.data().nom}</div>`; });
    });

    // --- TERMINAL ---
    document.getElementById('termInput').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = termInput.value.trim();
            termInput.value = "";
            if (cmd.startsWith('/ban ')) {
                const name = cmd.replace('/ban ', '').trim();
                await setDoc(doc(db, "BannedUsers", name), { date: serverTimestamp() });
            } else if (cmd.startsWith('/unban ')) {
                const name = cmd.replace('/unban ', '').trim();
                await deleteDoc(doc(db, "BannedUsers", name));
                await addDoc(collection(db, "HistoriqueDeban"), { nom: name, date: serverTimestamp() });
            }
        }
    });
</script>
</body>
</html>
